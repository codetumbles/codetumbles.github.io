# ----------------------------------------------------------------------------
# Site Settings
# ----------------------------------------------------------------------------
locale:        "en-US"
title:         "Code Tumbles"
title_separator: "-"
name:          "Usman Akram"
description:   "Notes I keep for my future self - on machine learning, software, and engineering."
url:           "https://codetumbles.github.io"
baseurl:       ""
repository:    "codetumbles/codetumbles.github.io"
words_per_minute: 200
timezone:      Etc/UTC

# ----------------------------------------------------------------------------
# Author / social (consumed by jekyll-seo-tag and footer)
# ----------------------------------------------------------------------------
author:
  name:    "Usman Akram"
  bio:     "Software Engineer"
  avatar:  "/assets/images/avatar.png"
  twitter: "ozmanakram"
  github:  "codetumbles"

twitter:
  username: ozmanakram
  card:     summary_large_image

social:
  type:  Person
  name:  "Usman Akram"
  links:
    - "https://twitter.com/ozmanakram"
    - "https://github.com/codetumbles"

# ----------------------------------------------------------------------------
# Feature flags
#
#   Each layout/include checks the flag before rendering, e.g.
#     {% if site.features.typewriter %}{% include typewriter.html %}{% endif %}
# ----------------------------------------------------------------------------
features:
  darkmode:            true
  search:              true
  rss:                 true
  mathjax:             true
  syntax_highlighting: true
  copy_code:           true
  heading_anchors:     true
  related_posts:       true
  reading_progress:    true
  newsletter:          false   # set true once `newsletter_url` is filled in
  mermaid:             false   # global default; per-post opt-in via `mermaid: true`
  typewriter:          false
  curated_lists:       false
  comments:            false   # set to "utterances" or "giscus" to enable

newsletter_url:        ""      # e.g. https://buttondown.email/api/emails/embed-subscribe/yourname

# Comments providers (only used when features.comments != false)
comments:
  utterances:
    repo:   ""
    issue_term: pathname
    theme:  github-light
  giscus:
    repo:   ""
    repo_id: ""
    category: General
    category_id: ""
    mapping: pathname
    reactions: 1

# ----------------------------------------------------------------------------
# Reading files
# ----------------------------------------------------------------------------
include:
  - _pages
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - bin
  - README.md
  - .bundle
  - .sass-cache
  - .jekyll-cache
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# ----------------------------------------------------------------------------
# Conversion
# ----------------------------------------------------------------------------
markdown:    kramdown
highlighter: rouge
lsi:         false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input:        GFM
  hard_wrap:    false
  auto_ids:     true
  footnote_nr:  1
  entity_output: as_char
  toc_levels:   1..3
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  syntax_highlighter: rouge

# ----------------------------------------------------------------------------
# Sass / SCSS
# ----------------------------------------------------------------------------
sass:
  sass_dir: _sass
  style:    compressed

# ----------------------------------------------------------------------------
# Outputting
# ----------------------------------------------------------------------------
permalink: /writing/:title/

# ----------------------------------------------------------------------------
# Collections
# ----------------------------------------------------------------------------
collections:
  writing:
    output:    true
    permalink: /writing/:path/
  talks:
    output:    true
    permalink: /talks/:path/

# ----------------------------------------------------------------------------
# Defaults
# ----------------------------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: writing
    values:
      layout: post
      related: true
  - scope:
      path: ""
      type: talks
    values:
      layout: post
      related: false
  - scope:
      path: ""
      type: pages
    values:
      layout: page

# ----------------------------------------------------------------------------
# Plugins
# ----------------------------------------------------------------------------
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jemoji

# Per-tag archive pages are generated by _plugins/tag_pages.rb (which scans
# the writing and talks collections — something jekyll-archives can't do
# out-of-the-box).

# ----------------------------------------------------------------------------
# Default OG image (overridable via `image:` front matter on a post)
# ----------------------------------------------------------------------------
image: /assets/og/default.png
logo:  /assets/images/avatar.png
future: true
